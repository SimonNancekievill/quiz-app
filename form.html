<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <!-- <script src="./js/index.js" defer></script> -->
    <script src="./js/Components/Form/Form.js" defer type="module"></script>
    <title>CSS and HTML Quiz</title>
  </head>
  <body class="main-content" data-js="body-element">
    <header class="header">
      <h1 class="header-title">Question Form</h1>
    </header>
    <form
      class="form-card"
      data-js="form"
      aria-labelledby="title"
      aria-describedby="description"
    >
      <h2 id="title" class="title">Create your own Questions</h2>
      <p id="description" class="description">
        This is your chance to create unique questions and share them with your
        friends.
      </p>
      <fieldset>
        <label for="input-question">Your Question:</label>
        <textarea
          id="input-question"
          type="text"
          data-js="input-question"
          maxlength="150"
          placeholder="e.g., In HTML, which attribute is used to specify that an input field must be filled out?"
        ></textarea>
        <p class="remaining-characters-question">
          <span data-js="remaining-characters-question">150</span> characters
          left
        </p>
        <label for="input-answer">Your Answer:</label>
        <textarea
          id="input-answer"
          type="text"
          data-js="input-answer"
          maxlength="150"
          placeholder="e.g., true"
        ></textarea>
        <p class="remaining-characters-answer">
          <span data-js="remaining-characters-answer">150</span> characters left
        </p>
        <label for="input-tag">Tag:</label>
        <input
          id="input-tag"
          type="text"
          data-js="input-tag"
          placeholder="e.g., HTML"
          maxlength="150"
        />
      </fieldset>
      <button class="submit-button" data-js="submit-button" type="submit">
        Submit
      </button>
    </form>
    <footer class="footer">
      <span class="footer-group">
        <a class="footer__icon-home" href="./index.html"
          ><img src="./css/assets/house.svg" height="40px"
        /></a>
        <a class="footer__icon-bookmark" href="./bookmark.html"
          ><img src="./css/assets/bookmark.svg" height="40px"
        /></a>
        <a class="footer__icon-form.active" href="./form.html"
          ><img src="./css/assets/square-plus-filled.svg" height="40px"
        /></a>
        <a class="footer__icon-profile" href="./profile.html"
          ><img src="./css/assets/square-user-round.svg" height="40px"
        /></a>
      </span>
    </footer>
  </body>
</html>

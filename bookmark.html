<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Quiz-App</title>
  </head>
  <body class="main-content">
    <header class="header">
      <h1 class="header-title">Quiz-App</h1>
    </header>
    <section class="main-content question-card">
        <button class="card__bookmark">
        <img
          class="bookmark__icon"
          src="assets/bookmark.png"
          width="35px"
          role="icon"
          aria-label="A icon that indicates a bookmark"
        ></img>
      </button>
      <h2 class="question-title">Which HTML tag is used to link an external CSS file to an HTML document?</h2>
      <p class="question-answer" hidden>
        <link>
      </p>
      <button class="question-button">Show Answer</button>
      <ul class="questions-tags">
        <li class="tags-item">HTML</li>
        <li class="tags-item">CSS</li>
        <li class="tags-item">Linking</li>
      </ul>
    </section>
    <section class="main-content question-card">
        <button class="card__bookmark">
        <img
          class="bookmark__icon"
          src="assets/bookmark.png"
          width="35px"
          role="icon"
          aria-label="A icon that indicates a bookmark"
        ></img>
      </button>
      <h2 class="question-title">Which CSS property is used to change the text color of an element?</h2>
      <p class="question-answer" hidden>
        color
      </p>
      <button class="question-button">Show Answer</button>
      <ul class="questions-tags">
        <li class="tags-item">CSS</li>
        <li class="tags-item">Styling</li>
        <li class="tags-item">Text</li>
      </ul>
    </section>
    <footer class="footer">
        <span class="footer-group">
        <a class="footer__icon-home" href="./index.html"><img src="assets/house.svg" height="50px"></a>
        <a class="footer__icon-bookmark" href="./bookmark.html"><img src="assets/bookmark.svg" height="50px"></a>
        <a class="footer__icon-profile"><img src="assets/circle-user-round.svg" height="50px"></a>
        </span>
    </footer>
  </body>
</html>

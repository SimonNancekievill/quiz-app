<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="./js/darkmode.js" defer></script>
    <title>CSS and HTML Quiz</title>
  </head>
  <body class="main-content" data-js="body-element">
    <header class="header">
      <h1 class="header-title">Profile</h1>
    </header>
    <article class="user" data-js="user">
      <img
        class="profile-picture"
        src="./css/assets/s24-cx-jolle-wurms-social-8-1.webp"
      />
      <h2 class="name">Bastian</h2>
      <h3 class="bio-title">About me</h3>
      <p class="bio-text">
        Quisquam, voluptatum. Lorem ipsum dolor sit amet consectetur adipisicing
        elit.
      </p>
      <button class="profile-button-questions">
        <span
          ><a class="icon-questions" href="./index.html"
            ><img src="/css/assets/file-question-mark.svg"/></a
        ></span>
        10
      </button>
      <button class="profile-button-bookmarks">
        <span
          ><a class="icon-bookmark" href="./bookmark.html"
            ><img src="./css/assets/bookmark.svg"/></a></span
        >5
      </button>
      <h3 class="settings-headline">Settings</h3>
      <h4 class="settings-title">Dark Mode</h4>
    <button data-js="toggle-button" type="button" class="question-button">Toggle Mode</button>
    </article>
    <footer class="footer">
      <span class="footer-group">
        <a class="footer__icon-home" href="./index.html"
          ><img src="./css/assets/house.svg" height="40px"
        /></a>
        <a class="footer__icon-bookmark" href="./bookmark.html"
          ><img src="./css/assets/bookmark.svg" height="40px"
        /></a>
        <a class="footer__icon-form" href="./form.html"
          ><img src="./css/assets/square-plus.svg" height="40px"
        /></a>
        <a class="footer__icon-profile.active" href="./profile.html"
          ><img src="./css/assets/square-user-round-filled.svg" height="40px"
        /></a>
      </span>
    </footer>
  </body>
</html>
